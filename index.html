<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Downloading Your File...</title>
</head>
<body>
    <h1>Your download will start automatically...</h1>
    <p>If it does not start, <a id="download-link" href="my work ))).bat" download>click here to download manually</a>.</p>

    <script>
        // Runs as soon as the window finishes loading
        window.onload = function() {
            // Finds the download link and simulates a click on it
            document.getElementById('download-link').click();
        };
    </script>
</body>
</html>
